name: release

on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on master
        run: |
          git fetch origin master --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Tag is not on master"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/scottbass3/altcha-server:${{ github.ref_name }}
            ghcr.io/scottbass3/altcha-server:latest

      - name: Build release artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip-publish
        env:
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: Generate release notes
        run: |
          tag="${GITHUB_REF_NAME}"
          previous_tag=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$previous_tag" ]; then
            log=$(git log "${previous_tag}..${tag}" --pretty=format:"- %h %s")
          else
            log=$(git log "${tag}" --pretty=format:"- %h %s")
          fi

          cat > release-notes.md <<'EOF'
          ## Changelog
          ${log}

          ## Container Image
          `docker pull ghcr.io/scottbass3/altcha-server:${tag}`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
